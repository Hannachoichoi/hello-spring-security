<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-5" style="max-width: 720px;">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">비밀번호 변경</h4>
        </div>

        <div class="card-body">
            <form th:action="@{/user/password}"
                  th:object="${passwordChangeDto}"
                  method="post">

                <div class="mb-3">
                    <label class="form-label">현재 비밀번호</label>
                    <input type="password" th:field="*{currentPassword}" class="form-control">
                    <div class="text-danger small"
                         th:if="${#fields.hasErrors('currentPassword')}"
                         th:errors="*{currentPassword}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">새 비밀번호</label>
                    <input type="password" th:field="*{newPassword}" class="form-control">
                    <div class="text-danger small"
                         th:if="${#fields.hasErrors('newPassword')}"
                         th:errors="*{newPassword}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">새 비밀번호 확인</label>
                    <input type="password" th:field="*{confirmPassword}" class="form-control">
                    <div class="text-danger small"
                         th:if="${#fields.hasErrors('confirmPassword')}"
                         th:errors="*{confirmPassword}"></div>
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/products}" class="btn btn-outline-secondary">취소</a>
                    <button type="submit" class="btn btn-primary">비밀번호 변경</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="text-center mt-4 py-3 border-top text-muted">
        <p th:text="${'학번: 2171148  |  성명: 최한나  |  실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></p>
    </footer>
</div>
</body>
</html>
