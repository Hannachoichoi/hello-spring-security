<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 수정 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-5" style="max-width: 720px;">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">상품 수정</h4>
        </div>

        <div class="card-body">
            <form th:action="@{/products/{id}/edit(id=${productId})}"
                  th:object="${productDto}"
                  method="post">

                <div class="mb-3">
                    <label class="form-label">상품명</label>
                    <input type="text" th:field="*{name}" class="form-control">
                    <div class="text-danger small" th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">가격</label>
                    <input type="number" th:field="*{price}" class="form-control">
                    <div class="text-danger small" th:if="${#fields.hasErrors('price')}"
                         th:errors="*{price}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">설명</label>
                    <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">재고</label>
                    <input type="number" th:field="*{stock}" class="form-control">
                    <div class="text-danger small" th:if="${#fields.hasErrors('stock')}"
                         th:errors="*{stock}"></div>
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/products}" class="btn btn-outline-secondary">목록으로</a>
                    <button type="submit" class="btn btn-primary">수정 완료</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="text-center mt-4 py-3 border-top text-muted">
        <p th:text="${'학번: 2171148  |  성명: 최한나  |  실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></p>
    </footer>
</div>
</body>
</html>
